<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #007BFF;
      color: white;
    }

    tr:hover {
      background: #f1f1f1;
    }

    .logout {
      float: right;
      background: red;
      color: white;
      padding: 8px 15px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .search {
      width: 97%;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Admin Dashboard</h1>
    <button class="logout" onclick="logout()">Logout</button>
    <button onclick="deleteLogs()" style="background:red;color:white;padding:10px;border:none;border-radius:5px;cursor:pointer;">
  Delete All Logs
</button>

    <input type="text" id="search" class="search" placeholder="Search email..." onkeyup="filterTable()">

    <table id="logTable">
      <thead>
        <tr>
          <th>Email</th>
          <th>IP</th>
          <th>City</th>
          <th>Country</th>
          <th>Time</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } 
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { 
  getFirestore, collection, getDocs, query, orderBy,
  deleteDoc, doc, setDoc } 
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC_ai3QC8MpUyVRrKrhvHr74ItTIsIl-pg",
      authDomain: "logindemo-34202.firebaseapp.com",
      projectId: "logindemo-34202",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const tableBody = document.querySelector("#logTable tbody");

    onAuthStateChanged(auth, (user) => {
    if (!user) {
    window.location.href = "https://examplesite2026.vercel.app/Loginpage.html";
    return;
  }

  // ✅ Normalize email (fix errors)
  const email = user.email.trim().toLowerCase();

  if (email === "admin@gmail.com") {
    // ✅ ADMIN → stay here
    loadLogs();
  } else {
    // ❌ NOT ADMIN → redirect
    window.location.href = "https://examplesite2026.vercel.app/Toolssamgabuang.html";
  }
});

    // 📊 Load login data
    async function loadLogs() {
      const q = query(collection(db, "logins"), orderBy("time", "desc"));
      const snapshot = await getDocs(q);

      tableBody.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        const row = `
          <tr>
            <td>${data.email || ""}</td>
            <td>${data.ip || ""}</td>
            <td>${data.city || ""}</td>
            <td>${data.country || ""}</td>
            <td>${data.time ? new Date(data.time.seconds * 1000).toLocaleString() : ""}</td>
            <td>
              <button onclick="kickUser('${data.email}')">Kick</button>
            </td>
        </tr>
     `;

        tableBody.innerHTML += row;
      });
    }

    // 🔍 Search filter
    window.filterTable = function () {
      const input = document.getElementById("search").value.toLowerCase();
      const rows = document.querySelectorAll("#logTable tbody tr");

      rows.forEach(row => {
        const email = row.cells[0].textContent.toLowerCase();
        row.style.display = email.includes(input) ? "" : "none";
      });
    }

    // 🚪 Logout
    window.logout = function () {
      signOut(auth).then(() => {
        window.location.href = "https://examplesite2026.vercel.app/Loginpage.html";
      });
    }
    // 🗑 Delete all logs
   window.deleteLogs = async function () {
    const confirmDelete = confirm("Delete all logs?");
     if (!confirmDelete) return;

    const snapshot = await getDocs(collection(db, "logins"));

     for (const d of snapshot.docs) {
     await deleteDoc(doc(db, "logins", d.id));
    }

     alert("All logs deleted!");
     loadLogs();
  };

 window.kickUser = async function(email) {

  // 🚪 Block user
  await setDoc(doc(db, "blockedUsers", email), {
    email: email,
    blocked: true
  });

  // 🗑 Delete their logs
  const snapshot = await getDocs(collection(db, "logins"));

  for (const d of snapshot.docs) {
    const data = d.data();

    if (data.email === email) {
      await deleteDoc(doc(db, "logins", d.id));
    }
  }

  alert(email + " kicked and logs removed!");
  loadLogs(); // refresh table
};
  </script>

</body>
</html>
