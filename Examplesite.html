<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: Arial;

  background: url("https://wallpapercave.com/wp/wp2757874.gif") no-repeat center center;
  background-size: cover;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* DARK OVERLAY */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  top: 0;
  left: 0;
}

/* LOGIN BOX */
.login-box {
  position: relative;
  background: rgba(20, 20, 30, 0.9);
  padding: 30px;
  border-radius: 8px;
  width: 280px;
  text-align: left;
  color: white;

  /* 🔥 GLOW EFFECT */
  box-shadow: 0 0 15px #00ffcc;
}

/* TITLE */
.login-box h2 {
  margin-bottom: 15px;
}

/* INPUT */
input {
  width: 92%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 4px;
  background: #e5e5e5;
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  background: #1e7be6;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

button:hover {
  background: #1665c1;
}

#error {
  color: red;
  font-size: 14px;
  margin-top: 10px;
  text-align: center;
}
</style>

</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="password" id="password" placeholder="Enter password">

  <button onclick="checkPassword()">Login</button>

  <div id="error"></div>
</div>

<script>

function checkPassword() {
  var input = document.getElementById("password").value;

  if (input === "1234") {

    localStorage.setItem("loggedIn", "true");

    document.getElementById("error").style.color = "#00ffcc";
    document.getElementById("error").innerText = "ACCESS GRANTED...";

    fadeAndRedirect("main.html");

  } else {

    document.getElementById("error").style.color = "red";
    document.getElementById("error").innerText = "Wrong password";

    fadeAndRedirect("home.html");
  }
}

function fadeAndRedirect(page) {
  document.body.style.transition = "opacity 0.6s ease";
  document.body.style.opacity = "0";

  setTimeout(function(){
    window.location.href = page;
  }, 700);
}

// ⌨️ ENTER KEY SUPPORT
document.getElementById("password").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    checkPassword();
  }
});

</script>

</body>
</html>
